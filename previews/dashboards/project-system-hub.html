/* ════════════════════════════════════════════════════════════
   Trembus Visual Grammar v0.1 — knowledge-layer tokens (--vg-*)
   Extracted verbatim from soul-steel-command-center.html.
   This file owns the KNOWLEDGE-LAYER palette + base chrome.
   Per the grammar's "Palette Ownership Rule", --vg-* and --sc-*
   never share a canvas without explicit partition — keep this
   file and sc-partition.css as separate imports.
   ════════════════════════════════════════════════════════════ */
:root {
  --vg-domain-ai-systems:    #2EC4B6;
  --vg-domain-game-dev:      #43AA8B;
  --vg-domain-business:      #F4A261;
  --vg-domain-creative-lore: #9D4EDD;
  --vg-domain-funding:       #577590;

  --vg-mood-exploring:  #FFB703;
  --vg-mood-grinding:   #3A86FF;
  --vg-mood-drifting:   #8D99AE;
  --vg-mood-uncertain:  #E63946;

  --vg-actor-human:     #3A86FF;
  --vg-actor-llm:       #2EC4B6;
  --vg-actor-co:        #9D4EDD;
  --vg-actor-automated: #8D99AE;

  --vg-page:        #0a0d12;
  --vg-surface:     #1c2128;
  --vg-border:      #2a3038;
  --vg-border-soft: #1f242c;
  --vg-page-glow:   rgba(46, 196, 182, 0.06);

  --vg-text:       #e6edf3;
  --vg-text-dim:   #8b949e;
  --vg-text-faint: #5a6371;

  --vg-gold:       #d4af37;
  --vg-edge:       #5a6371;
  --vg-edge-label: #8b949e;

  --vg-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
  --vg-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace;

  --ease-calm: cubic-bezier(0.22, 0.61, 0.36, 1);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: #05070a;
  color: var(--vg-text);
  font-family: var(--vg-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}
#root { height: 100vh; }

.vg-canvas {
  background: var(--vg-page);
  background-image: radial-gradient(ellipse 50% 40% at 50% 0%, var(--vg-page-glow), transparent 70%);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

.lens-canvas { animation: lensIn 320ms var(--ease-calm); }
@keyframes lensIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pcc-pulse { animation: pccPulse 2000ms var(--ease-calm) infinite; }
@keyframes pccPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,183,3,0.0); }
  50% { box-shadow: 0 0 0 4px rgba(255,183,3,0.18); }
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #232a32; border-radius: 6px; border: 2px solid #05070a; }
::-webkit-scrollbar-thumb:hover { background: #2f3742; }
* { scrollbar-width: thin; scrollbar-color: #232a32 transparent; }
::selection { background: var(--vg-domain-ai-systems); color: var(--vg-page); }

button { font: inherit; }
button:focus-visible { outline: 1px solid var(--vg-gold); outline-offset: 2px; }

.mono  { font-family: var(--vg-mono); }
.btn-primary {
  all: unset; cursor: pointer; padding: 9px 18px; border-radius: 5px;
  background: var(--vg-gold); color: var(--vg-page);
  font-family: var(--vg-mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.btn-ghost {
  all: unset; cursor: pointer; padding: 9px 16px; border-radius: 5px;
  background: transparent; color: var(--vg-text-dim);
  font-family: var(--vg-mono); font-size: 12px;
  letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid var(--vg-border);
}
.btn-gold-ghost { border-color: var(--vg-gold); color: var(--vg-gold); }

.clickable { cursor: pointer; }
.fade-dim { opacity: 0.3; }

/* view-toggle pill (kept for parity; single-view kit files don't render it) */
.view-toggle { display: inline-flex; gap: 2px; padding: 3px; border-radius: 6px; background: var(--vg-surface); border: 1px solid var(--vg-border); }
.view-toggle button, .view-toggle a {
  all: unset; cursor: pointer; padding: 5px 11px; border-radius: 4px;
  font-family: var(--vg-mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--vg-text-dim);
  text-decoration: none;
}
.view-toggle button.on { background: var(--vg-gold); color: var(--vg-page); font-weight: 700; }
.view-toggle a { color: var(--vg-text-faint); border-left: 1px solid var(--vg-border); border-radius: 0 4px 4px 0; }
.view-toggle a:hover { color: var(--vg-gold); }

/* artifact pointer links + chips (decisions src · step files · artifacts lens) */
.art-a { color: var(--vg-text-dim); text-decoration: none; border-bottom: 1px dotted var(--vg-border); }
.art-a:hover { color: var(--vg-gold); border-bottom-color: var(--vg-gold); }
.art-chip { all: unset; cursor: pointer; flex-shrink: 0; font-family: var(--vg-mono); font-size: 9px; letter-spacing: 0.08em; color: var(--vg-text-faint); border: 1px solid var(--vg-border); border-radius: 4px; padding: 2px 6px; line-height: 1.4; }
.art-chip:hover { color: var(--vg-gold); border-color: rgba(212, 175, 55, 0.55); }

/* ════════════════════════════════════════════════════════════
   Steel City status palette — PARTITIONED (.sc canvases only).
   Ported verbatim from the command center (steel-city/tokens.css
   + deck.css + deck-v1/v2.css). This file owns the PROJECT-STATUS
   layer: hex tiles, milestone ribbon, decision talent tree, leaves,
   scars. Do not mix with --vg-* chrome on the same element subtree.

   Status semantics (the leaf / tile / step color language):
     shipped  = --sc-scrip   (green)   chosen + shipped
     current  = --sc-cyan    (cyan)    current focus
     blessed  = --sc-gold    (gold)    ADR-blessed
     deferred = --sc-warning (amber)   deferred / relaxed / waived
     banned   = --sc-critical (red)    rejected / cut / scar
   ════════════════════════════════════════════════════════════ */
.sc {
  --sc-steel: #4A5568; --sc-edge: #5a6478; --sc-line: #313947;
  --sc-scrip: #88FF44; --sc-cyan: #44DDFF; --sc-warning: #FF8855;
  --sc-critical: #FF4444; --sc-gold: #D4AF37; --sc-crimson: #B33A3A;
  --sc-bone: #f1f4f8; --sc-ash: #b8bfcb; --sc-dust: #6e7686;
  --sc-darkest: #0e1115; --sc-darker: #1c2027;
  --sc-panel: #131720; --sc-panel-2: #1a1f2a; --sc-hair: #2a3142;
  color: var(--sc-bone);
  position: relative;
}
.sc-frame { position: absolute; inset: 0; pointer-events: none; }
.sc-frame::before, .sc-frame::after {
  content: ''; position: absolute; width: 48px; height: 48px;
  border: 1px solid var(--sc-gold); opacity: 0.45;
}
.sc-frame::before { top: 0; left: 0; border-right: none; border-bottom: none; }
.sc-frame::after  { bottom: 0; right: 0; border-left: none; border-top: none; }

.sc-banner {
  display: flex; align-items: center; gap: 14px; padding: 12px 20px;
  background: linear-gradient(90deg, rgba(212,175,55,0.10), rgba(68,221,255,0.06));
  border: 1px solid rgba(212,175,55,0.35); border-radius: 4px;
  font-family: var(--vg-mono); font-size: 12px; color: var(--sc-bone);
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
}
.sc-banner .icon { color: var(--sc-gold); }

.sc-panel {
  background: linear-gradient(180deg, var(--sc-panel) 0%, var(--sc-panel-2) 100%);
  border: 1px solid var(--sc-line); border-radius: 4px; padding: 22px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
}
.sc-panel.cyan { border-color: rgba(68,221,255,0.35); }
.sc-eyebrow {
  font-family: var(--vg-mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.28em; color: var(--sc-gold); text-transform: uppercase;
  margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
}
.sc-eyebrow::before { content: '◆'; font-size: 9px; opacity: 0.7; }
.sc-eyebrow.cyan { color: var(--sc-cyan); }

/* ── hex flower (flat-top · 6 around 1) — deck-v1 geometry ── */
.sc-hex-wrap {
  position: relative; display: grid; place-items: center;
  background: radial-gradient(ellipse at center, rgba(68,221,255,0.04), transparent 60%);
  border-radius: 4px; flex-shrink: 0;
}
.sc-hex { position: relative; width: 720px; height: 620px; }
.sc-tile {
  position: absolute; width: 224px; height: 194px;
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  background: var(--sc-panel);
  border: 1px solid var(--sc-line);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 24px 32px; text-align: center; cursor: pointer;
  transition: opacity 200ms ease, transform 200ms ease;
}
.sc-tile.shipped {
  background: linear-gradient(155deg, rgba(68,221,255,0.22) 0%, var(--sc-panel) 70%);
  border-color: var(--sc-cyan);
}
.sc-tile.shipped::before {
  content: ''; position: absolute; inset: 4px;
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  border: 1px solid var(--sc-gold); opacity: 0.55; pointer-events: none;
}
.sc-tile.planned { background: var(--sc-panel); opacity: 0.78; }
.sc-tile.planned .sc-name { color: var(--sc-ash); }
.sc-tile.center {
  background: linear-gradient(180deg, var(--sc-darker) 0%, var(--sc-darkest) 100%);
  border-color: var(--sc-gold); border-style: dashed; opacity: 0.78; z-index: 2;
}
.sc-tile.sel { opacity: 1; transform: scale(1.03); z-index: 5; }
.sc-tile.sel::after {
  content: ''; position: absolute; inset: 2px;
  clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  border: 2px solid var(--sc-gold); pointer-events: none;
}
/* positions: container 720×620 · tile 224×194 · NE/SE at (±168,±97) · N/S at (0,±194) */
.sc-tile.pos-hub    { top: 213px; left: 248px; }
.sc-tile.pos-robot  { top: 19px;  left: 248px; }
.sc-tile.pos-blood  { top: 116px; left: 416px; }
.sc-tile.pos-decay  { top: 310px; left: 416px; }
.sc-tile.pos-spirit { top: 407px; left: 248px; }
.sc-tile.pos-fate   { top: 310px; left: 80px;  }
.sc-tile.pos-shared { top: 116px; left: 80px;  }

.sc-tile .sc-dot { width: 14px; height: 14px; border-radius: 50%; margin-bottom: 6px; box-shadow: 0 0 12px currentColor; }
.sc-tile .sc-tag {
  font-family: var(--vg-mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.28em; color: var(--sc-gold); text-transform: uppercase;
}
.sc-tile .sc-name {
  font-family: var(--vg-sans); font-weight: 800; font-size: 22px; color: var(--sc-bone);
  letter-spacing: -0.005em; line-height: 1; margin-top: 2px; white-space: nowrap;
}
.sc-tile .sc-sub {
  font-family: var(--vg-mono); font-size: 9px; letter-spacing: 0.14em;
  color: var(--sc-ash); margin-top: 6px; text-transform: uppercase; white-space: nowrap;
}
.sc-tile .sc-status {
  margin-top: 8px; padding: 3px 9px; border-radius: 999px;
  font-family: var(--vg-mono); font-size: 8px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; white-space: nowrap;
}
.sc-tile.shipped .sc-status { background: var(--sc-scrip); color: var(--sc-darkest); box-shadow: 0 0 12px rgba(136,255,68,0.35); }
.sc-tile.planned .sc-status { background: var(--sc-steel); color: var(--sc-ash); }
.sc-tile.center .sc-name { color: var(--sc-gold); font-size: 20px; }
.sc-tile.center .sc-sub {
  color: var(--sc-ash); font-size: 10px; max-width: 150px; text-transform: none;
  letter-spacing: 0.04em; font-style: italic; line-height: 1.35; white-space: normal;
}
.sc-tile.center .sc-status { background: rgba(212,175,55,0.18); color: var(--sc-gold); border: 1px solid var(--sc-gold); }

/* ── scope table + strategy quote ── */
.sc-scope { width: 100%; border-collapse: separate; border-spacing: 0; }
.sc-scope tr td { padding: 9px 12px; border-bottom: 1px solid var(--sc-hair); vertical-align: top; }
.sc-scope tr:last-child td { border-bottom: none; }
.sc-scope td:first-child {
  font-family: var(--vg-mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--sc-cyan); width: 32%; font-weight: 700;
}
.sc-scope td:nth-child(2) { font-size: 13px; color: var(--sc-bone); line-height: 1.45; }
.sc-scope td .num { font-family: var(--vg-mono); color: var(--sc-scrip); font-weight: 600; margin-right: 6px; }
.sc-strategy {
  font-family: var(--vg-sans); font-style: italic; font-size: 15px; font-weight: 500;
  color: var(--sc-ash); line-height: 1.45; padding: 14px 18px;
  border-left: 2px solid var(--sc-gold); background: rgba(212,175,55,0.04);
}

/* ── milestone ribbon ── */
.sc-ribbon {
  display: flex; flex-direction: column; gap: 12px; padding: 18px 22px;
  background: var(--sc-panel); border: 1px solid var(--sc-line); border-radius: 4px;
}
.sc-ribbon-eyebrow {
  font-family: var(--vg-mono); font-size: 11px; font-weight: 700; letter-spacing: 0.28em;
  color: var(--sc-gold); text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.sc-ribbon-eyebrow .total { color: var(--sc-scrip); font-size: 10px; }
.sc-track { display: flex; align-items: stretch; overflow-x: auto; }
.sc-step {
  flex: 1; min-width: 108px; position: relative;
  padding: 14px 30px 12px 12px;
  border: 1px solid var(--sc-line); border-right: none;
  background: var(--sc-panel-2);
}
.sc-step:last-child { border-right: 1px solid var(--sc-line); }
.sc-step.shipped { background: linear-gradient(180deg, rgba(136,255,68,0.13), var(--sc-panel-2)); border-color: rgba(136,255,68,0.4); }
.sc-step.deferred { background: linear-gradient(180deg, rgba(255,136,85,0.12), var(--sc-panel-2)); border-color: rgba(255,136,85,0.4); }
.sc-step.current { background: linear-gradient(180deg, rgba(68,221,255,0.13), var(--sc-panel-2)); border-color: var(--sc-cyan); box-shadow: 0 0 14px rgba(68,221,255,0.2); }
.sc-step .step-code {
  font-family: var(--vg-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.32em;
  color: var(--sc-scrip); text-transform: uppercase; margin-bottom: 3px;
}
.sc-step.deferred .step-code { color: var(--sc-warning); }
.sc-step.current .step-code { color: var(--sc-cyan); }
.sc-step .step-name { font-family: var(--vg-sans); font-weight: 700; font-size: 12.5px; color: var(--sc-bone); line-height: 1.15; margin-bottom: 4px; }
.sc-step .step-date { font-family: var(--vg-mono); font-size: 9px; color: var(--sc-dust); letter-spacing: 0.06em; }
.sc-step .step-check {
  position: absolute; top: 8px; right: 8px; width: 14px; height: 14px;
  display: grid; place-items: center; background: var(--sc-scrip); color: var(--sc-darkest);
  border-radius: 50%; font-size: 10px; font-weight: 800; box-shadow: 0 0 8px rgba(136,255,68,0.35);
}
.sc-step.deferred .step-check { background: var(--sc-warning); }
.sc-step.current .step-check { background: var(--sc-cyan); }

/* ── decision talent tree — deck-v2 ── */
.sc-legend {
  display: flex; align-items: center; gap: 18px; padding: 12px 18px; flex-wrap: wrap;
  background: var(--sc-panel); border: 1px solid var(--sc-line); border-radius: 4px;
}
.sc-legend .legend-label { font-family: var(--vg-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--sc-gold); }
.sc-legend .li { display: inline-flex; align-items: center; gap: 7px; font-family: var(--vg-mono); font-size: 11px; letter-spacing: 0.04em; color: var(--sc-ash); }
.sc-legend .li .swatch { width: 11px; height: 11px; border-radius: 2px; background: var(--c); box-shadow: 0 0 8px var(--c); }
.sc-legend .meta { margin-left: auto; font-family: var(--vg-mono); font-size: 10px; color: var(--sc-dust); letter-spacing: 0.18em; text-transform: uppercase; }

.sc-tree { display: flex; flex-direction: column; align-items: center; min-width: 1080px; }
.sc-root {
  padding: 16px 36px; text-align: center; z-index: 3;
  background: linear-gradient(180deg, rgba(212,175,55,0.20), var(--sc-panel-2));
  border: 1px solid var(--sc-gold); border-radius: 4px;
  box-shadow: 0 0 24px rgba(212,175,55,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
}
.sc-root .root-eyebrow { font-family: var(--vg-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.32em; color: var(--sc-gold); text-transform: uppercase; }
.sc-root .root-title { font-family: var(--vg-sans); font-weight: 800; font-size: 24px; color: var(--sc-bone); margin-top: 4px; letter-spacing: -0.005em; }
.sc-trunk { width: 2px; height: 22px; background: var(--sc-gold); box-shadow: 0 0 8px rgba(212,175,55,0.35); }
.sc-trunk-bar { width: 88%; height: 2px; background: var(--sc-gold); box-shadow: 0 0 8px rgba(212,175,55,0.35); }
.sc-branches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; width: 100%; margin-top: 14px; }
.sc-branch { display: flex; flex-direction: column; align-items: center; position: relative; }
.sc-branch::before { content: ''; position: absolute; top: -14px; left: 50%; width: 2px; height: 14px; background: var(--sc-gold); opacity: 0.55; }
.sc-branch-head { width: 100%; padding: 9px 12px; background: var(--sc-panel-2); border: 1px solid var(--sc-gold); border-radius: 3px; text-align: center; }
.sc-branch-head .name { font-family: var(--vg-sans); font-weight: 700; font-size: 14px; color: var(--sc-bone); line-height: 1.1; }
.sc-branch-head .count { font-family: var(--vg-mono); font-size: 9px; font-weight: 700; letter-spacing: 0.22em; color: var(--sc-gold); text-transform: uppercase; margin-top: 3px; }
.sc-branch-stem { width: 2px; height: 12px; background: var(--sc-edge); opacity: 0.6; }
.sc-leaves { display: flex; flex-direction: column; gap: 7px; width: 100%; margin-top: 4px; }
.sc-leaf {
  position: relative; padding: 7px 10px 7px 28px; cursor: pointer;
  border: 1px solid var(--leaf, var(--sc-line)); border-radius: 3px;
  background: color-mix(in oklab, var(--leaf, var(--sc-steel)) 8%, var(--sc-panel));
  font-size: 11px; line-height: 1.35; color: var(--sc-bone);
  display: flex; flex-direction: column;
  transition: transform 150ms ease;
}
.sc-leaf.sel { transform: translateX(3px); box-shadow: 0 0 12px color-mix(in oklab, var(--leaf) 50%, transparent); border-width: 2px; padding: 6px 9px 6px 27px; }
.sc-leaf .leaf-marker {
  position: absolute; left: 8px; top: 8px; width: 12px; height: 12px; border-radius: 50%;
  background: var(--leaf); box-shadow: 0 0 8px var(--leaf);
  display: grid; place-items: center; color: var(--sc-darkest);
  font-family: var(--vg-mono); font-size: 8px; font-weight: 800;
}
.sc-leaf .leaf-title { font-weight: 600; font-size: 11px; color: var(--sc-bone); letter-spacing: -0.004em; }
.sc-leaf .leaf-meta { font-family: var(--vg-mono); font-size: 9px; color: var(--sc-dust); letter-spacing: 0.04em; margin-top: 1px; }
.sc-leaf.shipped  { --leaf: var(--sc-scrip); }
.sc-leaf.shipped  .leaf-marker::before { content: '✓'; }
.sc-leaf.current  { --leaf: var(--sc-cyan); }
.sc-leaf.current  .leaf-marker::before { content: '◉'; }
.sc-leaf.deferred { --leaf: var(--sc-warning); }
.sc-leaf.deferred .leaf-marker::before { content: '⏸'; font-size: 9px; }
.sc-leaf.deferred .leaf-title { color: var(--sc-ash); }
.sc-leaf.banned   { --leaf: var(--sc-critical); }
.sc-leaf.banned   .leaf-marker::before { content: '✕'; }
.sc-leaf.banned   .leaf-title { color: var(--sc-ash); text-decoration: line-through; text-decoration-color: rgba(255,68,68,0.4); }
.sc-leaf.blessed  { --leaf: var(--sc-gold); }
.sc-leaf.blessed  .leaf-marker::before { content: '★'; font-size: 7px; }
.sc-leaf.blessed  .leaf-meta { color: var(--sc-gold); }

/* ── scars (passives) ── */
.sc-scars { padding: 14px 18px; background: var(--sc-panel); border: 1px solid rgba(255,68,68,0.25); border-radius: 4px; }
.sc-scars .scars-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.sc-scars .scars-eyebrow { font-family: var(--vg-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--sc-critical); }
.sc-scars .scars-sub { font-family: var(--vg-sans); font-style: italic; font-size: 13px; color: var(--sc-ash); }
.sc-scars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px 14px; }
.sc-scar {
  display: flex; align-items: flex-start; gap: 8px; padding: 7px 10px;
  border: 1px solid rgba(255,68,68,0.28); border-radius: 3px;
  background: rgba(255,68,68,0.04);
}
.sc-scar .scar-mark {
  flex-shrink: 0; width: 16px; height: 16px; display: grid; place-items: center;
  background: var(--sc-critical); color: var(--sc-darkest);
  font-family: var(--vg-mono); font-size: 9px; font-weight: 800;
  border-radius: 2px; box-shadow: 0 0 8px rgba(255,68,68,0.5);
}
.sc-scar .scar-text { font-size: 10.5px; line-height: 1.35; color: var(--sc-ash); }
.sc-scar .scar-text strong { color: var(--sc-bone); font-weight: 600; }

</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
/* ════════════════════════════════════════════════════════════
   Trembus Visual Grammar — §1 grammar constants + small helpers
   Extracted verbatim from soul-steel-command-center.html (§1),
   with the artifact-pointer paths parameterized via VG_PATHS so
   the kit is project-agnostic.
   ════════════════════════════════════════════════════════════ */
const ACTOR = {
  human:     { color: '#3A86FF', label: 'HUMAN' },
  llm:       { color: '#2EC4B6', label: 'LLM'   },
  co:        { color: '#9D4EDD', label: 'CO'    },
  automated: { color: '#8D99AE', label: 'AUTO'  },
};
const MOOD = { exploring: '#FFB703', grinding: '#3A86FF', drifting: '#8D99AE', uncertain: '#E63946' };
const RISK_COLOR = { low: '#8b949e', med: '#3A86FF', gate: '#FFB703', high: '#E63946', stretch: '#5a6371' };
const RISK_LABEL = { low: 'low risk', med: 'medium', gate: 'gate', high: 'high risk', stretch: 'stretch' };
const REVERSIBLE_LABEL = { yes: 'reversible', caution: 'reversible · caution', no: 'irreversible' };
const STATUS = {
  pending: { label: 'pending', color: '#5a6371' },
  active:  { label: 'in progress', color: '#FFB703' },
  done:    { label: 'done', color: '#43AA8B' },
  blocked: { label: 'blocked', color: '#E63946' },
};
const STATUS_ORDER = ['pending', 'active', 'done'];
const ACTION_COLOR = { create: '#43AA8B', edit: '#3A86FF', run: '#FFB703', remove: '#E63946' };
const ACTION_LABEL = { create: 'create', edit: 'edit', run: 'run', remove: 'remove' };

const esc = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

const actorColor = (a) => (ACTOR[a] || ACTOR.human).color;
const nextStatus = (s) => STATUS_ORDER[(STATUS_ORDER.indexOf(s) + 1) % STATUS_ORDER.length];
const effStatus = (step) => step.blocked ? 'blocked' : (step.status || 'pending');

let _uid = 0;
const uid = (p) => p + (++_uid);

const dotHTML = (color, size, glow) => '<span style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + color
  + ';box-shadow:' + (glow === false ? 'none' : '0 0 6px ' + color) + ';flex-shrink:0;display:inline-block"></span>';

/* ── artifact pointers → actionable links ──────────────────────────
   Pointer strings ('_project/decisions/0005-….md', 'src/shared/network.ts',
   'games/steel-city/status.md · Tier 1') become an open-raw link (relative
   href — works from file:// and via a static server), an open-in-VS-Code
   chip, and a copy-path chip. Non-path pointers ('memory · …', bare source
   filenames whose repo is ambiguous) stay plain text.

   VG_PATHS is set by vg-loader from DATA.paths so the kit is not tied to one
   project. Shape (all optional):
     { spaceRel, spaceAbs,   // project root, e.g. '../../' and '/abs/Project/'
       codeRel,  codeAbs,    // 'src/…' rewrite target (external code symlink)
       assetsRel, assetsAbs } // 'library/…' rewrite target (asset library)
   With no VG_PATHS, links fall back to a plain relative href ('../../' + path)
   and no absolute (VS-Code) chip. */
let VG_PATHS = null;
function artTarget(raw) {
  const pathPart = String(raw == null ? '' : raw).split(' · ')[0].trim();
  if (!pathPart || !/[./]/.test(pathPart)) return null;            // 'memory', bare words
  if (/^[^/]+\.(ts|tsx|lua|luau)$/.test(pathPart)) return null;    // bare source file — home repo ambiguous
  let link = pathPart;
  if (link.includes('*')) {                                        // glob → parent dir listing
    const cut = link.lastIndexOf('/');
    if (cut < 0) return null;
    link = link.slice(0, cut + 1);
  }
  const P = VG_PATHS || {};
  const spaceRel = P.spaceRel || '../../';
  if (/^src\//.test(link) && P.codeRel) return { show: pathPart, rel: P.codeRel + link, abs: (P.codeAbs || '') + link };
  if (/^library\//.test(link) && P.assetsRel) return { show: pathPart, rel: P.assetsRel + link, abs: (P.assetsAbs || '') + link };
  return { show: pathPart, rel: spaceRel + link, abs: (P.spaceAbs || '') + link };
}
function artLinkHTML(raw) {
  const t = artTarget(raw);
  const parts = String(raw == null ? '' : raw).split(' · ');
  const tail = parts.length > 1 ? ' <span style="color:var(--vg-text-faint)">· ' + esc(parts.slice(1).join(' · ')) + '</span>' : '';
  if (!t) return '<span style="color:var(--vg-text-dim)">' + esc(raw) + '</span>';
  return '<a class="art-a" href="' + esc(t.rel) + '" title="open raw (served or file://)">' + esc(t.show) + '</a>' + tail;
}
function artChipsHTML(raw) {
  const t = artTarget(raw);
  if (!t || !t.abs) return '';
  return '<a class="art-chip" href="vscode://file' + esc(t.abs) + '" title="open in VS Code">&lt;/&gt;</a>'
    + '<button class="art-chip clickable" data-act="copy-path" data-id="' + esc(t.show) + '" title="copy path">copy</button>';
}

'use strict';
/* ════════════════════════════════════════════════════════════
   Trembus Visual Grammar — SVG glyph + mark generators
   Verbatim from soul-steel-command-center.html (§1). Pure
   functions of their args; depend only on ACTOR / STATUS / esc
   from vg-maps.js.
     · actorGlyphSVG  human=circle · llm=triangle · co=two circles · automated=square
     · outputGlyphSVG doc / data / index / id / queue
     · statusMarkSVG  done=check · active=pulse · blocked=dash · pending=hollow
   ════════════════════════════════════════════════════════════ */

/* per-actor texture pattern (svg defs) */
function actorPatternSVG(id, actor, color, fillOpacity) {
  const fo = fillOpacity == null ? 0.28 : fillOpacity;
  if (actor === 'llm') return '<pattern id="' + id + '" patternUnits="userSpaceOnUse" width="6" height="100">'
    + '<rect width="6" height="100" fill="' + color + '" opacity="' + fo + '"/>'
    + '<line x1="0.5" y1="0" x2="0.5" y2="100" stroke="' + color + '" stroke-width="1.25" opacity="0.32"/></pattern>';
  if (actor === 'co') return '<pattern id="' + id + '" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">'
    + '<rect width="8" height="8" fill="' + color + '" opacity="' + fo + '"/>'
    + '<line x1="0" y1="0" x2="0" y2="8" stroke="' + color + '" stroke-width="1.25" opacity="0.32"/></pattern>';
  if (actor === 'automated') return '<pattern id="' + id + '" patternUnits="userSpaceOnUse" width="6" height="6">'
    + '<rect width="6" height="6" fill="' + color + '" opacity="' + fo + '"/>'
    + '<circle cx="3" cy="3" r="0.8" fill="' + color + '" opacity="0.55"/></pattern>';
  return '<pattern id="' + id + '" patternUnits="userSpaceOnUse" width="8" height="8">'
    + '<rect width="8" height="8" fill="' + color + '" opacity="' + fo + '"/></pattern>';
}

/* actor glyph: human=circle · llm=triangle · co=two circles · automated=square */
function actorGlyphSVG(actor, size, color) {
  const shapes = {
    human: '<circle cx="12" cy="12" r="6" fill="' + color + '"/>',
    llm: '<polygon points="8,5 8,19 18,12" fill="' + color + '"/>',
    co: '<circle cx="8" cy="12" r="4" fill="' + color + '"/><circle cx="16" cy="12" r="4" fill="' + color + '"/>',
    automated: '<rect x="6" y="6" width="12" height="12" fill="' + color + '"/>',
  };
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" style="display:block;flex-shrink:0">'
    + (shapes[actor] || shapes.human) + '</svg>';
}

/* output-type glyph (monochrome, currentColor) */
function outputGlyphSVG(type, size, color) {
  const c = color || 'currentColor';
  const st = (inner, sw) => '<g fill="none" stroke="' + c + '" stroke-width="' + (sw || 1.6) + '" stroke-linejoin="miter" stroke-linecap="square">' + inner + '</g>';
  const shapes = {
    doc: st('<rect x="5" y="3" width="14" height="18"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/>'),
    data: st('<polyline points="9,5 3,12 9,19"/><polyline points="15,5 21,12 15,19"/>', 1.85),
    index: '<g fill="' + c + '"><rect x="4" y="4" width="6" height="6"/><rect x="14" y="4" width="6" height="6"/><rect x="4" y="14" width="6" height="6"/><rect x="14" y="14" width="6" height="6"/></g>',
    id: st('<circle cx="12" cy="12" r="4.5"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>', 1.75),
    queue: st('<line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>', 2),
  };
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" style="display:block;flex-shrink:0">'
    + (shapes[type] || shapes.doc) + '</svg>';
}

function actorBadgeHTML(actor, extraStyle) {
  const a = ACTOR[actor] || ACTOR.human;
  return '<span style="display:inline-flex;align-items:center;gap:4px;height:16px;padding:0 7px;background:' + a.color
    + ';color:#0a0d12;font-family:var(--vg-mono);font-size:9px;font-weight:700;letter-spacing:0.12em;border-radius:3px;text-transform:uppercase;'
    + (extraStyle || '') + '">' + actorGlyphSVG(actor, 9, '#0a0d12') + a.label + '</span>';
}

/* status mark at the chevron's leading edge */
function statusMarkSVG(step, size) {
  const stt = effStatus(step);
  const c = STATUS[stt].color;
  if (stt === 'done') {
    return '<span style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + c
      + ';display:inline-grid;place-items:center;box-shadow:0 0 7px ' + c + 'aa;flex-shrink:0">'
      + '<svg width="' + (size * 0.6) + '" height="' + (size * 0.6) + '" viewBox="0 0 24 24" fill="none" stroke="var(--vg-page)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>';
  }
  if (stt === 'active') {
    return '<span class="pcc-pulse" style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2px solid ' + c
      + ';display:inline-grid;place-items:center;flex-shrink:0;box-sizing:border-box">'
      + '<span style="width:' + (size * 0.34) + 'px;height:' + (size * 0.34) + 'px;border-radius:50%;background:' + c + '"></span></span>';
  }
  if (stt === 'blocked') {
    return '<span style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2px solid ' + c
      + ';display:inline-grid;place-items:center;flex-shrink:0;box-sizing:border-box">'
      + '<span style="width:' + (size * 0.46) + 'px;height:' + (size * 0.12) + 'px;background:' + c + ';border-radius:1px"></span></span>';
  }
  return '<span style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;border:2px solid var(--vg-border);flex-shrink:0;box-sizing:border-box;display:inline-block"></span>';
}

'use strict';
/* ════════════════════════════════════════════════════════════
   Trembus Visual Grammar — chevron renderers (Pipeline archetype)
   Verbatim from soul-steel-command-center.html (§6). Pure functions
   of (step, opts); no shared-state references. Depend on ACTOR,
   effStatus, esc, uid, dotHTML, RISK_COLOR (vg-maps) and
   actorPatternSVG, actorBadgeHTML, statusMarkSVG, actorGlyphSVG,
   outputGlyphSVG (vg-glyphs).
   ════════════════════════════════════════════════════════════ */

/* chevron polygon — point right, concave left */
function chevronPoints(width, height, notch) {
  const N = notch, P = notch;
  return [
    [0, 0], [width - P, 0], [width, height / 2],
    [width - P, height], [0, height], [N, height / 2],
  ].map(([x, y]) => x + ',' + y).join(' ');
}

function pipeChevronHTML(step, opts) {
  const o = opts || {};
  const a = ACTOR[step.actor] || ACTOR.human;
  const w = o.w || Math.max(206, Math.min(300, 150 + step.name.length * 6.6));
  const h = o.h || 96, notch = 16;
  const pid = uid('pc');
  const selected = o.selected, dim = o.dim;
  const stroke = step.destructive ? '#E63946' : a.color;
  const na = step.na;
  return '<div class="clickable" data-act="' + (o.dataAct || 'select-step') + '" data-id="' + esc(o.dataId != null ? o.dataId : step.n) + '"'
    + ' title="' + esc(step.n + ' · ' + step.name) + '"'
    + ' style="position:relative;width:' + w + 'px;height:' + h + 'px;flex-shrink:0;'
    + 'opacity:' + (dim ? 0.3 : (na ? 0.38 : (effStatus(step) === 'blocked' ? 0.5 : 1))) + ';'
    + 'filter:' + (step.deferred || na ? 'saturate(0.6)' : 'none') + ';transition:opacity 240ms ease">'
    + '<svg width="' + w + '" height="' + h + '" style="position:absolute;inset:0;overflow:visible">'
    + '<defs>' + actorPatternSVG(pid, step.actor, a.color, (step.deferred || na) ? 0.14 : 0.28) + '</defs>'
    + '<polygon points="' + chevronPoints(w, h, notch) + '" fill="url(#' + pid + ')" stroke="' + stroke + '"'
    + ' stroke-width="' + (selected ? 2.5 : 1.6) + '"' + ((step.deferred || na) ? ' stroke-dasharray="6,4"' : '')
    + ' stroke-linejoin="miter" style="' + (selected ? 'filter:drop-shadow(0 0 12px ' + a.color + 'cc)' : '') + ';transition:all 200ms ease"/>'
    + '</svg>'
    + '<div style="position:absolute;inset:0;padding:15px ' + (notch + 12) + 'px 13px ' + (notch + 14) + 'px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none">'
    + '<div><div style="font-family:var(--vg-mono);font-size:10px;color:var(--vg-text-faint);letter-spacing:0.12em;margin-bottom:3px;display:flex;align-items:center;gap:7px">'
    + (o.noStatus ? '' : statusMarkSVG(step, 14)) + esc(step.n)
    + (step.gate ? dotHTML(RISK_COLOR.gate, 5) : '') + '</div>'
    + '<div style="font-family:var(--vg-sans);font-size:' + (o.nameSize || 14) + 'px;font-weight:700;color:var(--vg-text);line-height:1.14;letter-spacing:-0.005em">' + esc(step.name) + '</div></div>'
    + '<div style="font-family:var(--vg-sans);font-size:10.5px;color:var(--vg-text-dim);line-height:1.32;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + esc(step.sub) + '</div>'
    + '</div>'
    + actorBadgeHTML(step.actor, 'position:absolute;top:6px;right:' + (notch + 4) + 'px;')
    + '</div>';
}

function miniChevronHTML(step, opts) {
  const o = opts || {};
  const a = ACTOR[step.actor] || ACTOR.human;
  const w = o.w || 176, h = o.h || 56, notch = 11;
  const pid = uid('mc');
  const stroke = step.destructive ? '#E63946' : a.color;
  return '<div class="clickable" data-act="select-step" data-id="' + esc(step.n) + '" title="' + esc(step.n + ' · ' + step.name) + '"'
    + ' style="position:relative;width:' + w + 'px;height:' + h + 'px;flex-shrink:0;'
    + 'opacity:' + (o.dim ? 0.3 : (effStatus(step) === 'blocked' ? 0.5 : 1)) + ';'
    + 'filter:' + (step.deferred ? 'saturate(0.55)' : 'none') + ';transition:opacity 220ms ease">'
    + '<svg width="' + w + '" height="' + h + '" style="position:absolute;inset:0;overflow:visible">'
    + '<defs>' + actorPatternSVG(pid, step.actor, a.color, step.deferred ? 0.14 : 0.26) + '</defs>'
    + '<polygon points="' + chevronPoints(w, h, notch) + '" fill="url(#' + pid + ')" stroke="' + stroke + '"'
    + ' stroke-width="' + (o.selected ? 2.25 : 1.4) + '"' + (step.deferred ? ' stroke-dasharray="5,4"' : '')
    + ' stroke-linejoin="miter" style="' + (o.selected ? 'filter:drop-shadow(0 0 10px ' + a.color + 'aa)' : '') + ';transition:all 200ms ease"/>'
    + '</svg>'
    + '<div style="position:absolute;inset:0;padding-left:' + (notch + 11) + 'px;padding-right:10px;display:flex;flex-direction:column;justify-content:center;gap:2px;pointer-events:none">'
    + '<div style="display:flex;align-items:center;gap:6px">' + statusMarkSVG(step, 13)
    + '<span style="font-family:var(--vg-mono);font-size:9.5px;color:var(--vg-text-faint);letter-spacing:0.1em">' + esc(step.n) + '</span>'
    + (step.gate ? dotHTML(RISK_COLOR.gate, 5) : '')
    + (step.destructive ? '<span style="font-family:var(--vg-mono);font-size:8.5px;color:#E63946;letter-spacing:0.08em">DESTRUCTIVE</span>' : '')
    + '</div>'
    + '<div style="font-family:var(--vg-sans);font-size:12px;font-weight:700;color:var(--vg-text);line-height:1.12;letter-spacing:-0.005em">' + esc(step.name) + '</div>'
    + '</div>'
    + (o.showActor === false ? '' : '<span style="position:absolute;top:5px;right:7px;display:inline-flex">' + actorGlyphSVG(step.actor, 9, a.color) + '</span>')
    + '</div>';
}

/* handoff connector between two chevrons (artifact label rides the line) */
function handoffHTML(label, type, w, h) {
  return '<div style="position:relative;width:' + (w || 48) + 'px;height:' + (h || 96) + 'px;flex-shrink:0;display:flex;align-items:center;justify-content:center">'
    + '<div style="position:absolute;top:50%;left:0;right:0;height:2px;background:var(--vg-edge);transform:translateY(-1px)"></div>'
    + ((label || type) ? '<div style="position:relative;background:var(--vg-page);padding:0 6px;font-family:var(--vg-mono);font-size:10px;color:var(--vg-edge-label);letter-spacing:0.02em;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;line-height:1">'
      + (type ? outputGlyphSVG(type, 11) : '') + esc(label || '') + '</div>' : '')
    + '</div>';
}

'use strict';
/* ════════════════════════════════════════════════════════════
   Trembus Visual Grammar — app shell + view registry
   This is the one render loop + event delegation the original
   command center had (soul-steel-command-center.html §16), minus
   the multi-plan / import / quick-capture chrome. It is view-
   agnostic: each archetype module (vg-hex / vg-tree / vg-board)
   registers into VG.MODULES and supplies the view-specific pieces.

   A produced page calls:  VG.boot(DATA, document.getElementById('root'))
   DATA.view ∈ { hub, decision-tree, plan-board } picks the module.
   ════════════════════════════════════════════════════════════ */
window.VG = window.VG || {};
VG.MODULES = VG.MODULES || {};
VG.chromeSlots = VG.chromeSlots || [];   // render-fns drawn into the switcher's right rail (capture, runner)
VG.actHandlers = VG.actHandlers || [];   // (act,id,e)=>bool extra click handlers for chrome features
VG.postRender = VG.postRender || [];     // fns run after every render() (e.g. rehydrate capture inputs)
VG.composite = VG.composite || null;     // set by VG.bootComposite for the multi-view command center

VG.state = { sel: null, lens: 'pipeline', hoverActor: null, statusMaps: {}, data: null, mod: null };

/* shared inspector-panel helpers (verbatim from §14) */
const labelHTML = (t) => '<div style="font-family:var(--vg-mono);font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--vg-text-faint);margin-bottom:9px">' + t + '</div>';
const mutedHTML = (t) => '<div style="font-family:var(--vg-sans);font-size:12px;color:var(--vg-text-faint)">' + t + '</div>';
const flagPill = (color, t) => '<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:3px;font-family:var(--vg-mono);font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;background:' + color + '1f;color:' + color + ';border:1px solid ' + color + '66">' + t + '</span>';

/* a stat chip in the header's right rail */
function statChipHTML(label, value, color) {
  return '<div style="text-align:right"><div style="font-family:var(--vg-mono);font-size:18px;color:' + (color || 'var(--vg-text)') + ';line-height:1">' + value + '</div>'
    + '<div style="font-family:var(--vg-mono);font-size:9px;color:var(--vg-text-faint);letter-spacing:0.14em;text-transform:uppercase;margin-top:3px">' + esc(label) + '</div></div>';
}

function validate(data) {
  if (!data || typeof data !== 'object') throw new Error('VG: DATA is missing or not an object');
  const v = data.view;
  const m = VG.MODULES[v];
  if (!m) throw new Error('VG: unknown view "' + v + '" — expected one of: ' + Object.keys(VG.MODULES).join(', '));
  const need = { hub: ['domains'], 'decision-tree': ['branches'], 'plan-board': ['phases', 'steps'] }[v] || [];
  for (const k of need) {
    if (!Array.isArray(data[k])) throw new Error('VG: ' + v + ' contract requires an array "' + k + '"');
  }
  return m;
}

function render() {
  const data = VG.state.data, m = VG.state.mod;
  const insp = m.inspector(VG.state, data) || { title: '', hasSel: false, html: '' };
  const sourceLine = m.sourceLine ? m.sourceLine(VG.state, data) : '';
  const keysLine = m.keysLine ? m.keysLine(VG.state, data) : 'esc clears selection';

  let html = '<div class="vg-canvas">'
    + '<header style="flex-shrink:0;padding:18px 28px 0;border-bottom:1px solid var(--vg-border);position:relative">'
    + (m.progressBar ? m.progressBar(VG.state, data) : '')
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px">'
    + '<div style="min-width:0">'
    + '<div style="display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap">'
    + '<span style="font-family:var(--vg-mono);font-size:10px;letter-spacing:0.24em;text-transform:uppercase;color:var(--vg-text-faint)">'
    + esc((data.brand || 'Command Center') + ' · Trembus Visual Grammar') + '</span></div>'
    + m.titleHTML(VG.state, data)
    + '</div>'
    + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:12px;flex-shrink:0">'
    + '<div style="display:flex;gap:18px">' + m.statsHTML(VG.state, data) + '</div>'
    + '</div></div>'
    + '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-top:14px">'
    + m.axisHTML(VG.state, data)
    + '</div></header>'
    + '<div style="flex:1;display:flex;min-height:0">'
    + '<main class="lens-canvas" style="flex:1;overflow:auto;padding:24px 28px">'
    + m.canvas(VG.state, data)
    + '<div style="margin-top:26px;padding-top:14px;border-top:1px solid var(--vg-border-soft);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:var(--vg-mono);font-size:10px;color:var(--vg-text-faint);letter-spacing:0.04em">'
    + '<span>' + esc(sourceLine) + '</span><span>' + esc(keysLine) + '</span></div>'
    + '</main>'
    + '<aside style="width:340px;flex-shrink:0;border-left:1px solid var(--vg-border);background:rgba(255,255,255,0.012);overflow:auto;padding:22px 22px 40px">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">'
    + '<span style="font-family:var(--vg-mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--vg-gold)">' + esc(insp.title) + '</span>'
    + (insp.hasSel ? '<button class="clickable" data-act="clear-select" style="all:unset;cursor:pointer;font-family:var(--vg-mono);font-size:10px;color:var(--vg-text-faint);letter-spacing:0.1em">✕ clear</button>' : '')
    + '</div>' + insp.html + '</aside></div></div>';

  // single-view pages drop the canvas straight into #root (unchanged); the
  // composer wraps it with the top-level view switcher.
  document.getElementById('root').innerHTML = VG.composite
    ? '<div class="vg-app">' + switcherHTML() + '<div class="vg-viewport">' + html + '</div></div>'
    : html;
  for (const fn of VG.postRender) { try { fn(); } catch (_) {} }
}
VG.render = render;

VG.boot = function (data, rootEl) {
  const m = validate(data);
  VG_PATHS = data.paths || null;
  VG.state.data = data;
  VG.state.mod = m;
  if (m.initState) m.initState(VG.state, data);

  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-act]');
    if (!t) return;
    const act = t.getAttribute('data-act');
    const id = t.getAttribute('data-id');
    if (act === 'copy-path') { try { navigator.clipboard.writeText(id); } catch (_) {} return; }
    if (act === 'clear-select') { VG.state.sel = null; render(); return; }
    if (m.onAct && m.onAct(act, id, e, VG.state, data)) render();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { VG.state.sel = null; render(); return; }
    if (m.onKey && m.onKey(e, VG.state, data)) { e.preventDefault(); render(); }
  });

  render();
};

/* ════════════════════════════════════════════════════════════
   Composite host — the command-center composer.
   Single-view pages use VG.boot above. The composer uses
   VG.bootComposite: it hosts N registered view-modules behind a
   top-level switcher and keeps VG.state pointed at the active view
   (the board's lens renderers read the global VG.state directly, so
   per-view {sel,lens,hoverActor} is snapshotted on switch). Chrome
   features (capture, runner) extend via VG.chromeSlots + VG.actHandlers
   — the loader itself needs no further edits to add them.
   ════════════════════════════════════════════════════════════ */
function loadActiveView() {
  const cv = VG.composite.views[VG.composite.active];
  VG.state.data = cv.data; VG.state.mod = cv.mod;
  VG.state.sel = cv.st.sel; VG.state.lens = cv.st.lens; VG.state.hoverActor = cv.st.hoverActor;
}
function saveActiveView() {
  const cv = VG.composite.views[VG.composite.active];
  cv.st.sel = VG.state.sel; cv.st.lens = VG.state.lens; cv.st.hoverActor = VG.state.hoverActor;
}
function switcherHTML() {
  const c = VG.composite;
  const tabs = c.views.map((v, i) =>
    '<button class="vg-tab' + (i === c.active ? ' on' : '') + '" data-act="switch-view" data-id="' + i + '">' + esc(v.label) + '</button>'
  ).join('');
  // link tabs navigate to sibling dashboards (e.g. Assets → asset-explorer.html) — not in-page views
  const links = (c.links || []).map((l) =>
    '<a class="vg-tab vg-tab-link" href="' + esc(l.href) + '"' + (l.newTab ? ' target="_blank" rel="noopener"' : '') + '>' + esc(l.label) + ' <span class="vg-tab-ext">↗</span></a>'
  ).join('');
  const chrome = VG.chromeSlots.map((fn) => { try { return fn(VG.state) || ''; } catch (_) { return ''; } }).join('');
  return '<nav class="vg-switcher">'
    + '<span class="vg-brand">' + esc(c.brand) + '</span>'
    + '<div class="vg-tabs">' + tabs + links + '</div>'
    + '<div class="vg-chrome">' + chrome + '</div></nav>';
}
VG.switcherHTML = switcherHTML;

VG.bootComposite = function (manifest, rootEl) {
  const views = (manifest.views || []).map((v) => {
    const data = v.data;
    const m = validate(data);                 // throws on unknown view / missing required arrays
    const st = { sel: null, lens: 'pipeline', hoverActor: null };
    if (m.initState) m.initState(st, data);
    return { view: data.view, label: v.label || data.tab || data.code || data.view, data: data, mod: m, st: st };
  });
  if (!views.length) throw new Error('VG: composite manifest has no views');
  VG_PATHS = manifest.paths || views[0].data.paths || null;
  VG.composite = { views: views, active: 0, brand: manifest.brand || 'Command Center', links: manifest.links || [] };
  loadActiveView();

  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-act]'); if (!t) return;
    const act = t.getAttribute('data-act'); const id = t.getAttribute('data-id');
    if (act === 'switch-view') { saveActiveView(); VG.composite.active = +id; loadActiveView(); render(); return; }
    if (act === 'copy-path') { try { navigator.clipboard.writeText(id); } catch (_) {} return; }
    if (act === 'clear-select') { VG.state.sel = null; render(); return; }
    for (const h of VG.actHandlers) { if (h(act, id, e)) { render(); return; } }
    const m = VG.state.mod;
    if (m.onAct && m.onAct(act, id, e, VG.state, VG.state.data)) render();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { VG.state.sel = null; render(); return; }
    const m = VG.state.mod;
    if (m.onKey && m.onKey(e, VG.state, VG.state.data)) { e.preventDefault(); render(); }
  });

  render();
};

'use strict';
/* ════════════════════════════════════════════════════════════
   Trembus Visual Grammar — HUB archetype (cortex-topology)
   A flat-top hex flower: one reserved center + up to 6 domain
   petals, a scope table, a strategy quote, and a milestone ribbon.
   Parameterized from soul-steel-command-center.html renderOverviewView.

   Contract: see schema/hub.schema.json. The 7 hex slots are fixed —
   each domain takes a `pos` ∈ {hub,robot,blood,decay,spirit,fate,shared}
   (defaults to the domain's id).
   ════════════════════════════════════════════════════════════ */
(function () {
  function pill(label, color, note) {
    const c = color || '#D4AF37';
    return '<span style="display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:4px;font-family:var(--vg-mono);font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;background:' + c + '1f;color:' + c + ';border:1px solid ' + c + '66">'
      + '<span style="width:5px;height:5px;border-radius:50%;background:' + c + ';box-shadow:0 0 6px ' + c + '"></span>' + esc(label) + '</span>'
      + (note ? '<span style="font-family:var(--vg-mono);font-size:10px;color:var(--vg-text-dim)">' + esc(note) + '</span>' : '');
  }

  function canvas(state, data) {
    const banner = data.banner || {};
    let out = '<div class="sc" style="display:flex;flex-direction:column;gap:20px;padding:8px 4px 40px">'
      + '<div class="sc-frame"></div>';
    if (banner.text || banner.note) {
      out += '<div class="sc-banner"><span class="icon">◆</span>'
        + '<span>' + esc(banner.text || '') + '</span>'
        + (banner.note ? '<span style="margin-left:auto;color:var(--sc-scrip)">' + esc(banner.note) + '</span>' : '')
        + '</div>';
    }
    out += '<div style="display:flex;gap:26px;align-items:flex-start;flex-wrap:wrap">'
      + '<div class="sc-hex-wrap"><div class="sc-hex">';
    for (const d of data.domains) {
      const pos = d.pos || d.id;
      out += '<div class="sc-tile ' + esc(d.kind) + ' pos-' + esc(pos) + (state.sel === d.id ? ' sel' : '') + '" data-act="select-domain" data-id="' + esc(d.id) + '">'
        + '<span class="sc-dot" style="background:' + esc(d.dot || '#5a6478') + ';color:' + esc(d.dot || '#5a6478') + '"></span>'
        + '<span class="sc-tag">' + esc(d.tag) + '</span>'
        + '<span class="sc-name">' + esc(d.name) + '</span>'
        + '<span class="sc-sub">' + esc(d.sub) + '</span>'
        + '<span class="sc-status">' + esc(d.status) + '</span></div>';
    }
    out += '</div></div>'
      + '<div style="flex:1;min-width:320px;display:flex;flex-direction:column;gap:18px">';
    if (data.scope && data.scope.length) {
      out += '<div class="sc-panel cyan"><div class="sc-eyebrow cyan">' + esc(data.scopeTitle || 'slice scope') + '</div><table class="sc-scope">';
      for (const row of data.scope) {
        const val = row.num != null
          ? '<span class="num">' + esc(row.num) + '</span>' + esc(row.value)
          : esc(row.value);
        out += '<tr><td>' + esc(row.label) + '</td><td>' + val + '</td></tr>';
      }
      out += '</table></div>';
    }
    if (data.strategy) out += '<div class="sc-strategy">' + esc(data.strategy) + '</div>';
    out += '</div></div>';
    if (data.ribbon && data.ribbon.length) {
      out += '<div class="sc-ribbon"><div class="sc-ribbon-eyebrow"><span>' + esc(data.ribbonTitle || 'Milestones') + '</span>'
        + (data.ribbonTotal ? '<span class="total">' + esc(data.ribbonTotal) + '</span>' : '') + '</div><div class="sc-track">';
      for (const s of data.ribbon) {
        out += '<div class="sc-step ' + esc(s.kind) + '"><span class="step-check">' + (s.kind === 'shipped' ? '✓' : s.kind === 'current' ? '◉' : '⏸') + '</span>'
          + '<div class="step-code">' + esc(s.code) + '</div>'
          + '<div class="step-name">' + esc(s.name) + '</div>'
          + '<div class="step-date">' + esc(s.date) + '</div></div>';
      }
      out += '</div></div>';
    }
    return out + '</div>';
  }

  function domainInspector(state, data) {
    const d = data.domains.find((x) => x.id === state.sel);
    if (!d) return overviewInspector(state, data);
    const kindColor = d.kind === 'shipped' ? '#44DDFF' : d.kind === 'center' ? '#D4AF37' : '#8b949e';
    return '<div style="display:flex;flex-direction:column;gap:18px">'
      + '<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      + '<span style="width:12px;height:12px;border-radius:50%;background:' + esc(d.dot || kindColor) + ';box-shadow:0 0 10px ' + esc(d.dot || kindColor) + '"></span>'
      + '<span style="font-family:var(--vg-mono);font-size:11px;color:var(--vg-text-faint);letter-spacing:0.18em;text-transform:uppercase">' + esc(d.tag) + ' domain</span>'
      + flagPill(kindColor, d.kind === 'shipped' ? 'piloted' : d.kind === 'center' ? 'reserved' : 'planned')
      + '</div>'
      + '<div style="font-family:var(--vg-sans);font-size:20px;font-weight:700;color:var(--vg-text);letter-spacing:-0.01em;line-height:1.15">' + esc(d.name === '—' ? d.tag : d.name) + '</div>'
      + (d.note ? '<div style="font-family:var(--vg-sans);font-size:13px;color:var(--vg-text-dim);line-height:1.55;margin-top:8px">' + esc(d.note) + '</div>' : '') + '</div>'
      + '<div>' + labelHTML('status') + '<div style="font-family:var(--vg-mono);font-size:12px;color:var(--vg-text)">' + esc(d.status) + '</div></div>'
      + (d.sources && d.sources.length ? '<div>' + labelHTML('sources of truth') + '<div style="display:flex;flex-direction:column;gap:4px">'
        + d.sources.map((s) => '<div style="font-family:var(--vg-mono);font-size:11px;color:var(--vg-text-dim);word-break:break-all">' + esc(s) + '</div>').join('') + '</div></div>' : '')
      + '</div>';
  }

  function overviewInspector(state, data) {
    return '<div style="display:flex;flex-direction:column;gap:20px">'
      + (data.sub ? '<div>' + labelHTML('overview') + '<div style="font-family:var(--vg-sans);font-size:12.5px;color:var(--vg-text-dim);line-height:1.55">' + esc(data.sub) + '</div></div>' : '')
      + '<div>' + labelHTML('reading the map')
      + '<div style="display:flex;flex-direction:column;gap:7px;font-family:var(--vg-sans);font-size:11.5px;color:var(--vg-text-dim);line-height:1.45">'
      + '<div><span style="color:#44DDFF">Illuminated tile</span> — shipped / piloted.</div>'
      + '<div><span style="color:var(--vg-text)">Dimmed tiles</span> — planned, not yet started.</div>'
      + '<div><span style="color:var(--vg-gold)">Dashed gold center</span> — the reserved convergence hub.</div></div></div>'
      + '<div>' + labelHTML('interaction') + mutedHTML('Click a tile for its detail and sources.') + '</div></div>';
  }

  function deriveStats(data) {
    const piloted = data.domains.filter((d) => d.kind === 'shipped').length;
    const shipped = (data.ribbon || []).filter((s) => s.kind === 'shipped').length;
    return [
      { label: 'domains', value: data.domains.filter((d) => d.kind !== 'center').length },
      { label: 'piloted', value: piloted, color: '#44DDFF' },
      { label: 'shipped steps', value: shipped, color: '#43AA8B' },
    ];
  }

  VG.MODULES.hub = {
    view: 'hub',
    titleHTML: (state, data) =>
      '<div style="font-family:var(--vg-mono);font-size:21px;color:var(--vg-gold);letter-spacing:-0.01em;line-height:1.1">' + esc(data.code || 'domain-map') + '</div>'
      + '<div style="display:flex;align-items:center;gap:12px;margin-top:9px;flex-wrap:wrap">' + pill(data.tagline || 'multi-domain ip', data.tone || '#D4AF37', data.taglineNote) + '</div>'
      + (data.sub ? '<div style="font-family:var(--vg-sans);font-size:13.5px;color:var(--vg-text-dim);line-height:1.45;margin-top:10px;max-width:880px">' + esc(data.sub) + '</div>' : ''),
    statsHTML: (state, data) => (data.stats || deriveStats(data)).map((s) => statChipHTML(s.label, s.value, s.color)).join(''),
    axisHTML: (state, data) => '<div style="font-family:var(--vg-mono);font-size:10px;color:var(--vg-text-faint);letter-spacing:0.1em;text-transform:uppercase;padding:10px 4px 12px">' + esc(data.axis || '1 IP → DOMAINS → SUB-GAMES → CONVERGENCE HUB') + '</div>',
    canvas: canvas,
    inspector: (state, data) => ({ title: state.sel ? 'domain detail' : 'ip overview', hasSel: !!state.sel, html: state.sel ? domainInspector(state, data) : overviewInspector(state, data) }),
    sourceLine: (state, data) => data.sourceLine || 'source-of-truth: mission + status.md · hex map + ribbon are a static projection',
    keysLine: (state, data) => (data.updated ? 'last updated ' + data.updated + ' · ' : '') + 'esc clears selection',
    onAct: (act, id, ev, state) => { if (act === 'select-domain') { state.sel = (state.sel === id ? null : id); return true; } return false; },
  };
})();

</script>
