name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No install step on purpose: the core is zero-dependency (check-zero-deps enforces it)
      # and has no lockfile, so `npm ci` would fail. The whole suite is hermetic Node ESM.
      - run: npm test
